name: inventiv_critic_flutter_example
description: Demonstrates how to use the inventiv_critic_flutter plugin.
publish_to: 'none'

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  path_provider: ^2.1.1

  inventiv_critic_flutter:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  logging: ^1.2.0

flutter:
  uses-material-design: true